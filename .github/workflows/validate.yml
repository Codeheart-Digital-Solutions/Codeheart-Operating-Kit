name: Validate

on:
  push:
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip setuptools pytest
      - run: python -m pip install -e .
      - run: python -m pytest -q
      - run: python scripts/validate-public-core.py
      - run: python scripts/validate-markdown-headers.py
      - run: python scripts/validate-release-manifest.py

  native-capabilities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip setuptools pytest
      - run: python -m pip install -e .
      - run: python -m pytest tests/test_capabilities.py -q

  release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip setuptools
      - run: python scripts/build-release-assets.py --output-dir dist
      - run: test -f dist/codeheart-operating-kit-0.1.0-macos.tar.gz
      - run: test -f dist/codeheart-operating-kit-0.1.0-windows.zip
      - run: python scripts/validate-release-manifest.py

  macos-installer:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip setuptools
      - run: python scripts/build-release-assets.py --output-dir dist
      - run: bash install.sh --help
      - run: bash install.sh --asset-file dist/codeheart-operating-kit-0.1.0-macos.tar.gz --checksum-file dist/codeheart-operating-kit-0.1.0-macos.tar.gz.sha256 --install-dir "$RUNNER_TEMP/codeheart-ok"
      - run: |
          "$RUNNER_TEMP/codeheart-ok/bin/codeheart-operating-kit" --help

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip setuptools
      - run: python scripts/build-release-assets.py --output-dir dist
      - run: .\install.ps1 -Help
        shell: pwsh
      - run: .\install.ps1 -AssetFile dist\codeheart-operating-kit-0.1.0-windows.zip -ChecksumFile dist\codeheart-operating-kit-0.1.0-windows.zip.sha256 -InstallDir "$env:RUNNER_TEMP\codeheart-ok"
        shell: pwsh
      - run: |
          & "$env:RUNNER_TEMP\codeheart-ok\bin\codeheart-operating-kit.cmd" --help
        shell: pwsh
