schema_version: 1
component:
  id: validators
  version: "0.1.3"
  name: Validators
  description: Manifest-backed validation contracts used by check, release, and sync commands.
  profiles:
    - standard
  consumer_impact:
    - "component addition"
    - "validator-only change"
  ownership_modes: []
  files: []
  validators:
    - id: component-manifest-yaml-parse
      inputs:
        - components/*/component.yaml
    - id: profile-yaml-parse
      inputs:
        - profiles/*.yaml
    - id: schema-json-parse
      inputs:
        - schemas/*.schema.json
    - id: no-workspace-generated-surface
      description: Ensure G1 profiles and schemas do not introduce a workspace documentation surface.
