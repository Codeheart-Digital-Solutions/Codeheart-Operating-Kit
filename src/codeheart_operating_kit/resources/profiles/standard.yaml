schema_version: 1
profile:
  id: standard
  version: "0.1.23"
  name: Standard
  description: Base public Operating Kit profile for general agent-first repositories and folders.
  selected_components:
    - planning-workflows
    - agent-memory
    - agent-interface
    - structure-governance
    - native-codex-capabilities
    - validators
  generated_surfaces:
    - path: .codeheart/kit/
      ownership: managed
      source: selected managed component files
    - path: .codeheart/kit.lock.yaml
      ownership: generated-surface
      source: schemas/kit-lock.schema.json
    - path: .codeheart/kit.config.yaml
      ownership: generated-surface
      source: schemas/kit-config.schema.json
    - path: AGENTS.md
      ownership: template
      source: templates/agents/AGENTS.managed-block.md
    - path: docs/repo/README.md
      ownership: scaffold
      source: templates/consumer-docs/repo/README.md
      install_when: absent
    - path: docs/repo/plans/plan-register.md
      ownership: scaffold
      source: components/planning-workflows/scaffolds/plan-register.md
      install_when: absent
    - path: docs/repo/plans/coordination-sync-pending.md
      ownership: scaffold
      source: components/planning-workflows/scaffolds/coordination-sync-pending.md
      install_when: absent
    - path: docs/agent-memory/README.md
      ownership: scaffold
      source: components/agent-memory/scaffolds/README.md
      install_when: absent
    - path: docs/agent-memory/goal-register.md
      ownership: scaffold
      source: components/agent-memory/scaffolds/goal-register.md
      install_when: absent
    - path: docs/agent-memory/session-ledger.md
      ownership: scaffold
      source: components/agent-memory/scaffolds/session-ledger.md
      install_when: absent
    - path: docs/agent-memory/untriaged-sessions.md
      ownership: scaffold
      source: components/agent-memory/scaffolds/untriaged-sessions.md
      install_when: absent
    - path: .codeheart/user/
      ownership: local-user
      source: local-user container
      install_when: absent
    - path: .codeheart/user/README.md
      ownership: local-user
      source: templates/user-layer/README.md
      install_when: absent
    - path: .codeheart/user/examples/preferences.yaml
      ownership: local-user
      source: templates/user-layer/example.preferences.yaml
      install_when: absent
    - path: .gitignore
      ownership: template
      source: internal/reconcile/plan.go
      install_when: conditional
      presence_policy: optional
      update_strategy: append-only
      removal_strategy: preserve
    - path: .codeheart/kit.transaction.json
      ownership: local-machine
      source: internal/reconcile/transaction.go
      install_when: conditional
    - path: .codeheart/local/kit-transactions/
      ownership: local-machine
      source: internal/reconcile/transaction.go
      install_when: conditional
  state_defaults:
    managed:
      presence_policy: required
      update_strategy: replace
      removal_strategy: reconcile
    scaffold:
      presence_policy: create-when-absent
      update_strategy: preserve
      removal_strategy: preserve
    template:
      presence_policy: required
      update_strategy: managed-section
      removal_strategy: preserve
    generated-surface:
      presence_policy: required
      update_strategy: replace
      removal_strategy: reconcile
    local-user:
      presence_policy: create-when-absent
      update_strategy: preserve
      removal_strategy: preserve
    local-machine:
      presence_policy: conditional
      update_strategy: report-only
      removal_strategy: preserve
